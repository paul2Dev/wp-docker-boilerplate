services:
  db:
    image: ${MYSQL_IMAGE}
    restart: unless-stopped
    # Clientul mariadb din imaginea wordpress:cli (Alpine, folosit de
    # make db-export/db-import) nu are plugin-ul caching_sha2_password
    # (implicit in MySQL 8) - trecem pe mysql_native_password, compatibil
    # cu ambele seturi de unelte client. --skip-ssl dezactiveaza TLS pe
    # server (conexiunea ramane in reteaua Docker privata a proiectului,
    # deci nu e un risc real) - fara el, clientul mariadb nu are in lista
    # de incredere certificatul self-signed generat de MySQL si esueaza cu
    # eroare de verificare TLS, chiar si cu --skip-ssl pe client.
    command: --default-authentication-plugin=mysql_native_password --skip-ssl
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    volumes:
      - db_data:/var/lib/mysql

  wordpress:
    image: ${WORDPRESS_IMAGE}
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${WORDPRESS_PORT}:80"
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      WORDPRESS_DEBUG: 1
      WORDPRESS_CONFIG_EXTRA: |
        define('WP_DEBUG_LOG', true);
        define('WP_DEBUG_DISPLAY', false);
        @ini_set('display_errors', 0);
        // Blocheaza editorul de fisiere din wp-admin (Plugins/Themes >
        // Editor) si instalarea/update-ul de plugin-uri si teme direct din
        // UI. Constantele astea se citesc din WORDPRESS_CONFIG_EXTRA la
        // fiecare incarcare a wp-config.php, per container - serviciul
        // wpcli nu are aceasta variabila in mediul lui, deci `make wp` /
        // `make wp-install` raman neafectate (nu e un bypass explicit al
        // WP-CLI, doar ca acel container nu vede constantele).
        define('DISALLOW_FILE_EDIT', true);
        define('DISALLOW_FILE_MODS', true);
    volumes:
      - wp_data:/var/www/html
      # Toate temele (implicite WP + orice instalezi manual/prin wp-cli),
      # vizibile si editabile pe host. Tema activa (THEME_SLUG) e suprascrisa
      # mai jos cu sursa git-tracked din ./theme - ordinea mount-urilor
      # conteaza, cel mai specific trebuie sa fie ultimul.
      - ./wp-content/themes:/var/www/html/wp-content/themes
      - ./theme:/var/www/html/wp-content/themes/${THEME_SLUG}
      # Media incarcata (poze, PDF-uri etc.) pe host, nu doar in volumul
      # Docker - supravietuieste unui `make reset` si e usor de copiat/
      # arhivat manual ca backup, fara nicio comanda dedicata.
      - ./wp-content/uploads:/var/www/html/wp-content/uploads
      - ./mu-plugins:/var/www/html/wp-content/mu-plugins

  wpcli:
    image: ${WPCLI_IMAGE}
    # wordpress (Debian) and wordpress:cli (Alpine) assign
    # different uids to "www-data" (33 vs 82). Files created by wpcli would
    # otherwise not be writable by the actual web server user (and vice
    # versa) - force wpcli to run as the same uid as the wordpress service.
    user: "33:33"
    depends_on:
      - db
      - wordpress
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
      # uid 33 (forta mai jos) nu are intrare in /etc/passwd in imaginea
      # Alpine wordpress:cli, deci $HOME cade pe "/" si wp-cli nu poate crea
      # ~/.wp-cli/cache/ acolo. Fortam cache-ul intr-un director mereu
      # scriptibil.
      WP_CLI_CACHE_DIR: /tmp/wp-cli-cache
    volumes:
      - wp_data:/var/www/html
      # Toate temele (implicite WP + orice instalezi manual/prin wp-cli),
      # vizibile si editabile pe host. Tema activa (THEME_SLUG) e suprascrisa
      # mai jos cu sursa git-tracked din ./theme - ordinea mount-urilor
      # conteaza, cel mai specific trebuie sa fie ultimul.
      - ./wp-content/themes:/var/www/html/wp-content/themes
      - ./theme:/var/www/html/wp-content/themes/${THEME_SLUG}
      # Media incarcata (poze, PDF-uri etc.) pe host, nu doar in volumul
      # Docker - supravietuieste unui `make reset` si e usor de copiat/
      # arhivat manual ca backup, fara nicio comanda dedicata.
      - ./wp-content/uploads:/var/www/html/wp-content/uploads
      - ./mu-plugins:/var/www/html/wp-content/mu-plugins
      - ./import:/import
      - ./html-export:/export:ro

  phpmyadmin:
    image: ${PHPMYADMIN_IMAGE}
    restart: unless-stopped
    depends_on:
      - db
    ports:
      - "${PHPMYADMIN_PORT}:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: ${MYSQL_ROOT_PASSWORD}

  # Prinde tot mail-ul trimis de WordPress (reset parola, notificari,
  # Contact Form 7 etc.) fara sa-l livreze cu adevarat - util ca sa
  # verifici local ce s-ar fi trimis. UI web la http://localhost:${MAILPIT_PORT}.
  # Ruteaza wp_mail() prin SMTP-ul lui mu-plugins/mailpit.php.
  mailpit:
    image: ${MAILPIT_IMAGE}
    restart: unless-stopped
    ports:
      - "${MAILPIT_PORT}:8025"

volumes:
  db_data:
  wp_data:
